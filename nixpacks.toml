# Railway build via Nixpacks for Laravel 11 + Vite + Vue.
#
# Both PHP and Node providers run. The PHP provider reads composer.json
# (including the `ext-*` entries in `require`) and installs the matching
# nix packages. We override only install/build/start.

providers = ["php", "node"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
