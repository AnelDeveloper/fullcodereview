# Railway build via Nixpacks for Laravel 11 + Vite + Vue.
#
# We let the Nixpacks PHP provider auto-detect PHP version and extensions
# from composer.json (see `ext-*` entries in `require`). Only the install,
# build, and start steps are overridden — and a fixed Node version pinned
# via setup so the Vite build is reproducible.

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist",
    "npm ci",
]

[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
